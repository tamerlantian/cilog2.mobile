buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        google()
        mavenCentral()
        // Repositorio requerido para react-native-background-geolocation
        maven {
            url("${project(':react-native-background-geolocation').projectDir}/libs")
        }
        // Repositorio adicional para dependencias de TransistorSoft
        maven {
            url 'https://transistorsoft.jfrog.io/artifactory/libs-release-local'
        }
    }
}
